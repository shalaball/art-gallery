<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About the Artist</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #ebebeb;
      color: #222;
      font-size: 18px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      min-height: 100vh;
    }

    nav {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      display: flex;
      justify-content: center;
      padding: 2rem 2rem 0;
      gap: 0;
      flex-wrap: nowrap;
    }

    nav a {
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #888;
      text-decoration: none;
      transition: color 0.2s;
      padding: 0 1.25rem;
    }

    nav a:first-child { padding-left: 0; }
    nav a + a { border-left: 1px solid #ccc; }
    nav a:hover, nav a.active { color: #222; }

    header {
      text-align: center;
      padding: 4rem 1rem 1rem;
    }

    header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 3.25rem;
      letter-spacing: 0.15em;
      color: #222;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: #ccc;
      margin: 2rem auto;
    }

    .about-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 3rem 4rem;
      gap: 4rem;
      align-items: start;
    }

    @media (max-width: 768px) {
      .about-layout {
        grid-template-columns: 1fr;
        padding: 1rem 2rem 4rem;
        gap: 2.5rem;
      }
    }

    .about-photo img {
      display: block;
      width: 100%;
      height: auto;
    }

    .about-photo.no-photo {
      background: #ddd;
      aspect-ratio: 3 / 4;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #aaa;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .about-text {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .about-text p {
      font-size: 1rem;
      line-height: 1.9;
      color: #444;
      font-weight: 300;
    }

    .about-cta {
      text-align: center;
      padding: 1rem 2rem 6rem;
    }

    .btn-home {
      display: inline-block;
      padding: 1.2rem 3rem;
      text-align: center;
      text-decoration: none;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #fff;
      background: #222;
      transition: background 0.25s;
    }

    .btn-home:hover {
      background: #555;
    }

    .contact-section {
      max-width: 560px;
      margin: 0 auto;
      padding: 0 2rem 6rem;
      text-align: center;
    }

    .contact-section h2 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 1.75rem;
      letter-spacing: 0.12em;
      color: #222;
      margin-bottom: 0.5rem;
    }

    .contact-section p {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 2rem;
      line-height: 1.7;
    }

    .contact-form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      text-align: left;
    }

    .contact-form label {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #888;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .contact-form input,
    .contact-form textarea {
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      font-size: 0.9rem;
      color: #222;
      background: #fff;
      border: 1px solid #ddd;
      padding: 0.75rem 1rem;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }

    .contact-form input:focus,
    .contact-form textarea:focus {
      border-color: #999;
    }

    .contact-form textarea {
      resize: vertical;
      min-height: 120px;
    }

    .contact-form button {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #fff;
      background: #222;
      border: none;
      padding: 1rem 2rem;
      cursor: pointer;
      transition: background 0.25s;
      align-self: flex-start;
    }

    .contact-form button:hover { background: #555; }

    footer {
      text-align: center;
      padding: 2rem;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: #ccc;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<nav>
  <a href="../">Home</a>
  <a href="../page-2/">In Private Collections in San Diego</a>
  <a href="../page-3/">In Private Collections in the San Francisco Bay Area</a>
  <a href="../all/">All</a>
  <a href="../page-1/">New Art</a>
  <a href="../about/" class="active">About the Artist</a>
</nav>

<header>
  <h1 id="about-title">About the Artist</h1>
</header>

<div class="divider"></div>

<div class="about-layout">
  <div id="about-photo-wrap"></div>
  <div class="about-text" id="about-text"></div>
</div>

<div class="about-cta">
  <a class="btn-home" id="about-btn" href="../">Explore my Gallery</a>
</div>

<div class="divider"></div>

<div class="contact-section">
  <h2>Get in Touch</h2>
  <p>Questions, commissions, or just to say hello — I'd love to hear from you.</p>
  <form class="contact-form" action="https://formspree.io/f/xkoqjpvy" method="POST">
    <!-- honeypot for spam bots -->
    <input type="text" name="_gotcha" style="display:none">
    <label>
      Your email
      <input type="email" name="email" required>
    </label>
    <label>
      Message
      <textarea name="message" required></textarea>
    </label>
    <button type="submit">Send Message</button>
  </form>
</div>

<footer>&copy; 2025 Shala Ball</footer>

<script src="about.js"></script>
<script>
  document.getElementById('about-title').textContent = ABOUT.title || 'About the Artist';

  const photoWrap = document.getElementById('about-photo-wrap');
  if (ABOUT.photo) {
    photoWrap.className = 'about-photo';
    photoWrap.innerHTML = `<img src="../photos/${ABOUT.photo}" alt="${ABOUT.title || 'Shala Ball'}">`;
  } else {
    photoWrap.className = 'about-photo no-photo';
    photoWrap.textContent = 'Photo coming soon';
  }

  const textEl = document.getElementById('about-text');
  const paragraphs = (ABOUT.bio || '').split(/\n\n+/).filter(p => p.trim());
  textEl.innerHTML = paragraphs.map(p => `<p>${p.trim()}</p>`).join('');

  const btn = document.getElementById('about-btn');
  btn.textContent = ABOUT.buttonText || 'Explore my Gallery';
</script>

</body>
</html>
