<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shala Gallery Admin</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.3/Sortable.min.js"></script>
</head>
<body>

<header>
  <h1>Shala Gallery Admin</h1>
  <div class="actions">
    <button class="btn btn-ghost" onclick="openPreview()">⎋ Preview</button>
    <button class="btn btn-primary" id="push-btn" onclick="pushToGithub()">↑ Sync Website</button>
    <button class="btn btn-ghost" onclick="quitApp()">✕ Quit</button>
  </div>
</header>

<div class="layout">

  <aside>
    <div class="sidebar-label">Pages</div>
    <ul class="page-list" id="page-list"></ul>
    <button class="new-page-btn" onclick="openNewPageModal()">+ New Page</button>
    <button class="sidebar-save-btn" id="sidebar-save-btn" onclick="saveCurrentPage()">Save Changes</button>
  </aside>

  <main id="main">
    <div class="empty-state">
      <p>Loading…</p>
    </div>
  </main>

</div>

<div id="sync-warning" style="background:#fff3cd;border:1px solid #ffc107;border-radius:6px;padding:12px 20px;margin:12px 24px 0;font-size:15px;color:#555;display:flex;align-items:center;gap:12px">
  <span style="font-size:1.1em">⚠️</span>
  <strong>Warning:</strong> Please <strong>Sync Website</strong> before editing to get any changes made on the other computer.
  <button onclick="document.getElementById('sync-warning').style.display='none'" style="margin-left:auto;background:none;border:none;cursor:pointer;color:#aaa;font-size:1.1em" title="Dismiss">✕</button>
</div>

<div class="push-log" id="push-log"></div>

<!-- New Page Modal -->
<div class="modal-overlay" id="new-page-modal">
  <div class="modal">
    <h3>New Gallery Page</h3>
    <label>Page Name</label>
    <input type="text" id="new-page-name" placeholder="e.g. Watercolors">
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeNewPageModal()">Cancel</button>
      <button class="btn btn-dark" onclick="createPage()">Create Page</button>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────────

let data          = null;  // { pages: [...] }
let currentPageId = null;
let sortable      = null;
let sidebarSortable = null;
let unsaved       = false;

// ── Init ───────────────────────────────────────────────────────────────────────

async function init() {
  try {
    const res = await fetch('/api/content');
    data = await res.json();
    renderSidebar();
    selectHome();
    initMainDragListeners();
  } catch (e) {
    renderEmptyMain('Failed to load content: ' + e.message);
  }
}

// ── Sidebar ────────────────────────────────────────────────────────────────────

function renderSidebar() {
  const list = document.getElementById('page-list');
  const homeItem = `
    <li class="${currentPageId === 'home' ? 'active' : ''}" onclick="selectHome()">
      <span class="page-icon">⌂</span> Home
    </li>
    <li class="${currentPageId === 'library' ? 'active' : ''}" onclick="selectLibrary()">
      <span class="page-icon">⊞</span> Library
    </li>
    <li class="${currentPageId === 'about' ? 'active' : ''}" onclick="selectAbout()">
      <span class="page-icon">✦</span> About the Artist
    </li>`;
  const pageItems = data.pages.map(p => `
    <li class="${p.id === currentPageId ? 'active' : ''}${p.hidden ? ' page-hidden' : ''}" data-id="${esc(p.id)}" onclick="selectPage('${esc(p.id)}')">
      <span class="page-icon">${p.hidden ? '○' : '▤'}</span> ${esc(p.name)}${p.hidden ? ' <span style="font-size:10px;color:#bbb;font-style:italic">(hidden)</span>' : ''}
    </li>
  `).join('');
  list.innerHTML = homeItem + pageItems;

  // Sidebar drag-to-reorder (skip Home item at index 0)
  if (sidebarSortable) sidebarSortable.destroy();
  sidebarSortable = new Sortable(list, {
    animation: 150,
    filter: 'li:first-child',
    onEnd: async () => {
      const pageIds = Array.from(list.querySelectorAll('li[data-id]')).map(li => li.dataset.id);
      await fetch('/api/reorder', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pageIds }),
      });
      const r = await fetch('/api/content');
      data = await r.json();
    },
  });
}

// ── Select library ─────────────────────────────────────────────────────────────

async function selectLibrary() {
  if (!checkUnsaved()) return;
  currentPageId = 'library';
  unsaved = false;
  renderSidebar();
  renderEmptyMain('Loading library…');
  try {
    const res   = await fetch('/api/library');
    const items = await res.json();
    renderLibraryMain(items);
  } catch (e) {
    renderEmptyMain('Failed to load library: ' + e.message);
  }
}

async function renderLibraryMain(items) {
  const pageOptions = data.pages.map(p =>
    `<option value="${esc(p.id)}">${esc(p.name)}</option>`
  ).join('');

  // Initialize zoom levels from stored metadata
  items.forEach(item => {
    if (item.zoom && item.zoom !== 1) {
      thumbZoomLevel[item.filename] = Math.round(Math.log(item.zoom) / Math.log(1.3));
    } else {
      thumbZoomLevel[item.filename] = 0;
    }
  });

  const cards = items.map(item => {
    const thumb = `/preview/photos/${esc(item.filename)}?t=${Date.now()}`;
    const zoomScale = Math.pow(1.3, thumbZoomLevel[item.filename] || 0);
    const zoomStyle = zoomScale !== 1 ? `style="transform:scale(${zoomScale})"` : '';
    const usedOn = item.pages.length
      ? 'Used on: ' + item.pages.map(id => {
          const p = data.pages.find(pg => pg.id === id);
          return p ? esc(p.name) : id;
        }).join(', ')
      : 'Not on any page';
    // Normalize desc to array
    const descLines = Array.isArray(item.desc) ? item.desc : (item.desc ? [item.desc] : ['']);
    const descLinesHtml = descLines.map((line, idx) => {
      if (idx === 0) {
        return `
              <div class="desc-line">
                <textarea class="lib-desc-input lib-desc-textarea" placeholder="Description…" oninput="autoGrow(this); markUnsaved()" rows="1">${esc(line)}</textarea>
                <button class="desc-remove-btn" title="Remove line" onclick="removeDescLine(this)">×</button>
              </div>`;
      }
      return `
              <div class="desc-line">
                <input type="text" class="lib-desc-input" value="${esc(line)}" placeholder="Description line…" oninput="markUnsaved()">
                <button class="desc-remove-btn" title="Remove line" onclick="removeDescLine(this)">×</button>
              </div>`;
    }).join('');
    const usedOnStyle = item.pages.length ? '' : ' style="color:#999;font-style:italic"';
    return `
      <div class="lib-card" data-filename="${esc(item.filename)}">
        <div class="lib-thumb-wrap">
          <img class="lib-thumb" src="${thumb}" alt="${esc(item.filename)}" loading="lazy" ${zoomStyle}>
        </div>
        <div class="lib-info">
          <div class="lib-filename">${esc(item.filename)}</div>
          <div class="lib-meta-inputs">
            <label>Title</label>
            <input type="text" class="lib-title-input" value="${esc(item.title || '')}" placeholder="Title…" oninput="markUnsaved()">
            <div class="desc-label-row"><label>Description</label></div>
            <div class="desc-lines">${descLinesHtml}
            </div>
            <button class="desc-add-btn" onclick="addDescLine(this)">+ add line</button>
          </div>
          <div class="lib-page-row">
            <span class="lib-pages-text"${usedOnStyle}>${usedOn}</span>
            <select class="lib-page-select" onchange="assignToPage('${esc(item.filename)}', this)">
              <option value="">Add to page…</option>
              ${pageOptions}
            </select>
          </div>
          <div class="lib-rotate-row">
            <button class="lib-rotate-btn" title="Rotate left" onclick="rotateLibPhoto('${esc(item.filename)}','ccw')">↺</button>
            <button class="lib-rotate-btn" title="Rotate right" onclick="rotateLibPhoto('${esc(item.filename)}','cw')">↻</button>
            <button class="lib-rotate-btn" title="Zoom out" onclick="zoomLibThumb('${esc(item.filename)}',-1)">−</button>
            <button class="lib-rotate-btn" title="Zoom in" onclick="zoomLibThumb('${esc(item.filename)}',+1)">+</button>
          </div>
        </div>
        <div class="lib-actions">
          <a class="btn btn-ghost" style="font-size:14px;padding:4px 10px;color:#555;text-decoration:none"
            href="/preview/photos/${esc(item.filename)}" download="${esc(item.filename)}" title="Download original">⬇</a>
          <button class="btn btn-ghost" style="font-size:14px;padding:4px 10px;color:#c00"
            onclick="deleteFromLibrary('${esc(item.filename)}', ${JSON.stringify(item.pages)})">Delete</button>
        </div>
      </div>`;
  }).join('');

  document.getElementById('main').innerHTML = `
    <div class="page-header">
      <div class="page-header-left">
        <h2>Photo Library</h2>
        <div class="page-sub">${items.length} photo${items.length !== 1 ? 's' : ''} · newest first · edit title &amp; zoom here</div>
      </div>
      <div class="page-header-right">
        <label class="btn btn-primary" style="cursor:pointer">
          ↑ Upload Photos
          <input type="file" accept="image/*" multiple style="display:none"
            onchange="uploadToLibrary(this.files)">
        </label>
      </div>
    </div>
    <div class="save-bar" style="margin-bottom:16px">
      <span class="save-status" id="save-status"></span>
    </div>
    <div class="lib-grid">${cards || '<p style="color:#aaa;padding:2rem">No photos in library yet.</p>'}</div>
  `;

  // Persistent drop overlay
  const overlay = document.createElement('div');
  overlay.id = 'drop-overlay';
  overlay.textContent = 'Drop photos to add to library';
  document.getElementById('main').appendChild(overlay);

  // Auto-size any textareas with existing content
  document.querySelectorAll('.lib-desc-textarea').forEach(ta => autoGrow(ta));

  markClean();
}

function autoGrow(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

function addDescLine(btn) {
  const container = btn.previousElementSibling; // .desc-lines
  const line = document.createElement('div');
  line.className = 'desc-line';
  line.innerHTML = `
    <input type="text" class="lib-desc-input" value="" placeholder="Description line…" oninput="markUnsaved()">
    <button class="desc-remove-btn" title="Remove line" onclick="removeDescLine(this)">×</button>
  `;
  container.appendChild(line);
  line.querySelector('input').focus();
  markUnsaved();
}

function removeDescLine(btn) {
  const line = btn.parentElement;
  const container = line.parentElement;
  if (container.querySelectorAll('.desc-line').length <= 1) {
    line.querySelector('input').value = '';
    markUnsaved();
    return;
  }
  line.remove();
  markUnsaved();
}

async function rotateLibPhoto(filename, direction) {
  try {
    const res = await fetch(`/api/rotate/library/${encodeURIComponent(filename)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ direction }),
    });
    if (res.ok) {
      const card = document.querySelector(`.lib-card[data-filename="${CSS.escape(filename)}"]`);
      if (card) {
        const img = card.querySelector('.lib-thumb');
        img.src = img.src.split('?')[0] + '?t=' + Date.now();
      }
    } else {
      const r = await res.json();
      setStatus('Rotate error: ' + r.error, false, true);
    }
  } catch (e) {
    setStatus('Rotate error: ' + e.message, false, true);
  }
}

function zoomLibThumb(filename, delta) {
  const card = document.querySelector(`.lib-card[data-filename="${CSS.escape(filename)}"]`);
  if (!card) return;
  const current = thumbZoomLevel[filename] || 0;
  const next = Math.max(-3, Math.min(6, current + delta));
  thumbZoomLevel[filename] = next;
  const scale = Math.pow(1.3, next);
  card.querySelector('.lib-thumb').style.transform = `scale(${scale})`;
  markUnsaved();
}

async function saveLibrary() {
  const updates = {};
  document.querySelectorAll('.lib-card').forEach(card => {
    const filename = card.dataset.filename;
    const title    = card.querySelector('.lib-title-input')?.value || '';
    const descInputs = card.querySelectorAll('.lib-desc-input');
    const desc     = [...descInputs].map(i => i.value).filter(v => v.trim());
    const zoom     = parseFloat(Math.pow(1.3, thumbZoomLevel[filename] || 0).toFixed(4));
    updates[filename] = { title, desc, zoom };
  });
  try {
    const res = await fetch('/api/photo-metadata', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(updates),
    });
    if (res.ok) markClean();
    else setStatus('Error saving metadata', false, true);
  } catch (e) {
    setStatus('Error: ' + e.message, false, true);
  }
}

async function uploadToLibrary(files) {
  if (!files || files.length === 0) return;
  const formData = new FormData();
  for (const f of files) formData.append('photos', f);
  setStatus(`Uploading ${files.length} photo(s) to library…`);
  try {
    const res    = await fetch('/api/upload-library', { method: 'POST', body: formData });
    const result = await res.json();
    if (result.ok) {
      const libRes = await fetch('/api/library');
      renderLibraryMain(await libRes.json());
      setStatus(`✓ Added ${result.added.length} photo(s) to library`, true);
    } else {
      setStatus('Upload error: ' + result.error, false, true);
    }
  } catch (e) {
    setStatus('Upload error: ' + e.message, false, true);
  }
}

async function assignToPage(filename, selectEl) {
  const pageId = selectEl.value;
  if (!pageId) return;
  selectEl.value = '';
  try {
    const res    = await fetch('/api/library/assign', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ filename, pageId }),
    });
    const result = await res.json();
    if (result.ok) {
      const pageName = data.pages.find(p => p.id === pageId)?.name || pageId;
      // Sync data from server so navigating to the page shows the new photo
      // and Save Changes doesn't overwrite the assignment with stale state
      const contentRes = await fetch('/api/content');
      data = await contentRes.json();
      // Update the "Used on:" tag line directly on the affected card
      const card = document.querySelector(`.lib-card[data-filename="${CSS.escape(filename)}"]`);
      if (card) {
        const pagesDiv = card.querySelector('.lib-pages');
        const cur = pagesDiv.textContent;
        pagesDiv.textContent = cur === 'Not on any page'
          ? 'Used on: ' + pageName
          : cur + ', ' + pageName;
      }
      setStatus(`✓ Added to ${pageName}`, true);
    } else {
      setStatus('Error: ' + result.error, false, true);
    }
  } catch (e) {
    setStatus('Error: ' + e.message, false, true);
  }
}

async function deleteFromLibrary(filename, pages) {
  const pageNames = pages.map(id => {
    const p = data.pages.find(pg => pg.id === id);
    return p ? p.name : id;
  });

  if (pages.length > 0) {
    const pageList = pageNames.join(', ');
    if (!confirm(`"${filename}" is used on: ${pageList}.\n\nDeleting it will remove it from those pages too. Continue?`)) return;
  } else {
    if (!confirm(`Delete "${filename}" from the library?`)) return;
  }

  const url = `/api/library/${encodeURIComponent(filename)}${pages.length ? '?force=1' : ''}`;
  try {
    const res    = await fetch(url, { method: 'DELETE' });
    const result = await res.json();
    if (result.ok) {
      const [libRes, contentRes] = await Promise.all([fetch('/api/library'), fetch('/api/content')]);
      data = await contentRes.json();
      await renderLibraryMain(await libRes.json());
      setStatus('✓ Deleted from library', true);
    } else {
      setStatus('Error: ' + result.error, false, true);
    }
  } catch (e) {
    setStatus('Error: ' + e.message, false, true);
  }
}

// ── Select home ────────────────────────────────────────────────────────────────

async function selectHome() {
  if (!checkUnsaved()) return;
  currentPageId = 'home';
  unsaved = false;
  renderSidebar();
  renderEmptyMain('Loading…');
  try {
    const [homeRes, settingsRes] = await Promise.all([fetch('/api/home'), fetch('/api/settings')]);
    const home     = await homeRes.json();
    const settings = await settingsRes.json();
    renderHomeMain(home, settings);
  } catch (e) {
    renderEmptyMain('Failed to load home page: ' + e.message);
  }
}

function renderHomeMain(home, settings = {}) {
  const lbl  = `style="display:block;font-size:13px;font-weight:700;color:#aaa;letter-spacing:.07em;text-transform:uppercase;margin-bottom:6px"`;
  const inp  = `style="width:100%;border:1px solid #e0e0e0;border-radius:4px;padding:8px 10px;font-size:16px;font-family:inherit;outline:none;background:#fafafa"`;
  const sel  = `style="width:100%;border:1px solid #e0e0e0;border-radius:4px;padding:7px 10px;font-size:15px;font-family:inherit;outline:none;background:#fafafa;color:#222"`;
  const bg   = settings.bgColor   || '#ffffff';
  const tc   = settings.textColor || '#222222';
  const tf    = settings.titleFont || 'Cormorant Garamond';
  const bf    = settings.bodyFont  || 'Montserrat';
  const tSz   = settings.titleSize != null ? settings.titleSize : 3;
  const bSz   = settings.bodySize  != null ? settings.bodySize  : 14;
  const tWt   = settings.titleWeight || '300';
  const tSt   = settings.titleStyle  || 'normal';
  const bWt   = settings.bodyWeight  || '300';
  const bSt   = settings.bodyStyle   || 'normal';
  const ctf   = settings.capTitleFont   || 'Cormorant Garamond';
  const ctSz  = settings.capTitleSize   != null ? settings.capTitleSize : 1.2;
  const ctWt  = settings.capTitleWeight || '400';
  const ctSt  = settings.capTitleStyle  || 'normal';
  const capAlign = settings.capAlign || 'center';
  const cdf   = settings.capDescFont    || 'Montserrat';
  const cdSz  = settings.capDescSize    != null ? settings.capDescSize : 0.75;
  const cdWt  = settings.capDescWeight  || '300';
  const cdSt  = settings.capDescStyle   || 'italic';
  const allFonts = ['Cormorant Garamond','Playfair Display','EB Garamond','Lora','Libre Baskerville','Crimson Text','DM Serif Display','Josefin Slab','Montserrat','Lato','Open Sans','Raleway','Source Sans 3','Nunito','Karla','Work Sans'];
  const titleOpts = ['Cormorant Garamond','Playfair Display','EB Garamond','Lora','Libre Baskerville','Crimson Text','DM Serif Display','Josefin Slab']
    .map(f => `<option${f===tf?' selected':''}>${f}</option>`).join('');
  const bodyOpts  = ['Montserrat','Lato','Open Sans','Raleway','Source Sans 3','Nunito','Karla','Work Sans']
    .map(f => `<option${f===bf?' selected':''}>${f}</option>`).join('');
  const fontOpts = (sel) => allFonts.map(f => `<option${f===sel?' selected':''}>${f}</option>`).join('');
  const weightOpts = (sel) => ['300','400','700'].map(w => {
    const label = w === '300' ? 'Light' : w === '400' ? 'Normal' : 'Bold';
    return `<option value="${w}"${w===sel?' selected':''}>${label}</option>`;
  }).join('');
  const styleOpts = (sel) => ['normal','italic'].map(s =>
    `<option value="${s}"${s===sel?' selected':''}>${s.charAt(0).toUpperCase()+s.slice(1)}</option>`
  ).join('');
  const ctaText    = home.ctaText    || '';
  const ctaHref    = home.ctaHref    || '';
  const ctaColor   = home.ctaColor   || '#888888';
  const ctaFont    = home.ctaFont    || 'Cormorant Garamond';
  const ctaSize    = home.ctaSize    != null ? home.ctaSize : 1;
  const ctaVisible = home.ctaVisible || false;
  const ctaFontOpts = ['Cormorant Garamond','Playfair Display','EB Garamond','Lora','Montserrat','Lato','Open Sans','Raleway']
    .map(f => `<option${f===ctaFont?' selected':''}>${f}</option>`).join('');

  document.getElementById('main').innerHTML = `
    <div style="background:#fffbe6;border:1px solid #ffe58f;border-radius:6px;padding:12px 16px;margin-bottom:24px;font-size:15px;line-height:1.7;color:#555">
      <strong style="color:#333">Tips:</strong>
      After making changes, press <strong>Save Changes</strong> to save. &nbsp;·&nbsp;
      Press <strong>Sync Website</strong> to make changes live on the website. &nbsp;·&nbsp;
      To see updated photos in the browser, press <strong>⌘ Shift R</strong> to force-refresh.
    </div>

    <div class="page-header">
      <div class="page-header-left">
        <h2>Home</h2>
        <div class="page-sub">Site title, subtitle, footer, and design</div>
      </div>
    </div>

    <div style="max-width:520px">
      <div style="margin-bottom:20px">
        <label ${lbl}>Site Title</label>
        <input id="home-title" type="text" value="${esc(home.title)}" ${inp} oninput="markUnsaved()">
      </div>
      <div style="margin-bottom:20px">
        <label ${lbl}>Subtitle</label>
        <input id="home-subtitle" type="text" value="${esc(home.subtitle)}" ${inp} oninput="markUnsaved()">
      </div>
      <div style="margin-bottom:32px">
        <label ${lbl}>Footer Text</label>
        <input id="home-footer" type="text" value="${esc(home.footer)}" ${inp} oninput="markUnsaved()">
      </div>

      <div style="border-top:1px solid #eee;padding-top:24px;margin-bottom:24px">
        <div style="font-size:13px;font-weight:700;color:#aaa;letter-spacing:.07em;text-transform:uppercase;margin-bottom:4px">Call to Action</div>
        <div style="font-size:13px;color:#aaa;margin-bottom:16px">Optional text link shown below the gallery buttons</div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">
          <input type="checkbox" id="cta-visible" ${ctaVisible ? 'checked' : ''} onchange="markUnsaved()" style="width:16px;height:16px;cursor:pointer">
          <label for="cta-visible" style="font-size:14px;color:#555;cursor:pointer">Show on home page</label>
        </div>
        <div style="margin-bottom:12px">
          <label ${lbl}>Text</label>
          <input id="cta-text" type="text" value="${esc(ctaText)}" ${inp} placeholder="e.g. Interested in a commission? Learn more →" oninput="markUnsaved()">
        </div>
        <div style="margin-bottom:12px">
          <label ${lbl}>Link URL</label>
          <input id="cta-href" type="text" value="${esc(ctaHref)}" ${inp} placeholder="e.g. about/" oninput="markUnsaved()">
        </div>
        <div style="display:grid;grid-template-columns:1fr auto;gap:12px;align-items:end;margin-bottom:12px">
          <div>
            <label ${lbl}>Font</label>
            <select id="cta-font" ${sel} onchange="markUnsaved()">${ctaFontOpts}</select>
          </div>
          <div>
            <label ${lbl}>Size</label>
            <div style="display:flex;align-items:center;gap:6px">
              <input type="number" id="cta-size" value="${ctaSize}" min="0.6" max="3" step="0.05"
                oninput="markUnsaved()"
                style="width:64px;border:1px solid #e0e0e0;border-radius:4px;padding:7px 8px;font-size:15px;font-family:inherit;outline:none;background:#fafafa;text-align:center">
              <span style="font-size:13px;color:#999">rem</span>
            </div>
          </div>
        </div>
        <div>
          <label ${lbl}>Color</label>
          <div style="display:flex;align-items:center;gap:8px">
            <input type="color" id="cta-color" value="${ctaColor}"

// ── Upload ─────────────────────────────────────────────────────────────────────

function getFilesFromDrop(e) {
  const files = [];
  // dataTransfer.items works with Apple Photos drag; .files works with Finder
  if (e.dataTransfer.items) {
    for (const item of e.dataTransfer.items) {
      if (item.kind === 'file') {
        const f = item.getAsFile();
        if (f && f.type.startsWith('image/')) files.push(f);
      }
    }
  }
  if (files.length === 0) {
    for (const f of e.dataTransfer.files) {
      if (f.type.startsWith('image/')) files.push(f);
    }
  }
  return files;
}

async function uploadPhotos(files) {
  if (!files || files.length === 0) return;
  const formData = new FormData();
  for (const f of files) formData.append('photos', f);
  setStatus(`Uploading ${files.length} photo(s)…`);
  try {
    const res    = await fetch(`/api/upload/${currentPageId}`, { method: 'POST', body: formData });
    const result = await res.json();
    if (result.ok) {
      await reloadAndRefresh();
      setStatus(`✓ Uploaded ${result.added.length} photo(s)`, true);
    } else {
      setStatus('Upload error: ' + result.error, false, true);
    }
  } catch (e) {
    setStatus('Upload error: ' + e.message, false, true);
  }
}

function initMainDragListeners() {
  const main = document.getElementById('main');
  let dragDepth = 0;

  const isDroppable = () => currentPageId && currentPageId !== 'home' && currentPageId !== 'about';

  main.addEventListener('dragenter', (e) => {
    if (!isDroppable()) return;
    e.preventDefault();
    dragDepth++;
    const overlay = document.getElementById('drop-overlay');
    if (overlay) overlay.classList.add('visible');
  });

  main.addEventListener('dragover', (e) => {
    if (!isDroppable()) return;
    e.preventDefault();
  });

  main.addEventListener('dragleave', () => {
    dragDepth = Math.max(0, dragDepth - 1);
    if (dragDepth === 0) {
      const overlay = document.getElementById('drop-overlay');
      if (overlay) overlay.classList.remove('visible');
    }
  });

  main.addEventListener('drop', (e) => {
    if (!isDroppable()) return;
    e.preventDefault();
    dragDepth = 0;
    const overlay = document.getElementById('drop-overlay');
    if (overlay) overlay.classList.remove('visible');
    if (currentPageId === 'library') {
      uploadToLibrary(getFilesFromDrop(e));
    } else {
      uploadPhotos(getFilesFromDrop(e));
    }
  });
}

// ── Toggle page visibility ─────────────────────────────────────────────────────

async function togglePageVisibility(pageId, currentlyHidden) {
  const newHidden = !currentlyHidden;
  const page = data.pages.find(p => p.id === pageId);
  const label = page ? page.name : pageId;
  const action = newHidden ? `hide "${label}" from the nav and home page` : `show "${label}" on the nav and home page`;
  if (!confirm(`This will ${action}. Continue?`)) return;
  const res = await fetch('/api/page-visibility', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ pageId, hidden: newHidden })
  });
  if (!res.ok) { alert('Failed to update page visibility'); return; }
  if (page) page.hidden = newHidden;
  renderSidebar();
  renderMain(page);
}

// ── Delete page ────────────────────────────────────────────────────────────────

async function deletePage(pageId) {
  const page = data.pages.find(p => p.id === pageId);
  if (!confirm(`Delete the page "${page.name}"?\n\nThis permanently deletes all its photos and content.`)) return;
  const res = await fetch(`/api/page/${pageId}`, { method: 'DELETE' });
  if (res.ok) {
    unsaved = false;
    await reloadAndRefresh();
    selectHome();
  }
}

// ── Remove photo ───────────────────────────────────────────────────────────────

async function rotatePhoto(filename, direction) {
  try {
    const res = await fetch(`/api/rotate/${currentPageId}/${encodeURIComponent(filename)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ direction }),
    });
    if (res.ok) {
      // Refresh just this thumbnail without reloading the whole page
      const card = document.querySelector(`.photo-card[data-filename="${CSS.escape(filename)}"]`);
      if (card) {
        const img = card.querySelector('.photo-thumb');
        img.src = img.src.split('?')[0] + '?t=' + Date.now();
      }
    } else {
      const r = await res.json();
      setStatus('Rotate error: ' + r.error, false, true);
    }
  } catch (e) {
    setStatus('Rotate error: ' + e.message, false, true);
  }
}

const thumbZoomLevel = {};  // filename → integer step (0 = default)

function zoomThumb(filename, delta) {
  const card = document.querySelector(`.photo-card[data-filename="${CSS.escape(filename)}"]`);
  if (!card) return;
  const current = thumbZoomLevel[filename] || 0;
  const next = Math.max(-3, Math.min(6, current + delta));
  thumbZoomLevel[filename] = next;
  const scale = Math.pow(1.3, next);
  card.querySelector('.photo-thumb').style.transform = `scale(${scale})`;
}

async function removePhoto(filename) {
  if (!confirm(`Remove "${filename}" from this page?\n(The photo file will be deleted.)`)) return;
  try {
    const res = await fetch(`/api/photo/${currentPageId}/${encodeURIComponent(filename)}`, { method: 'DELETE' });
    if (res.ok) {
      await reloadAndRefresh();
      setStatus('✓ Photo removed', true);
    }
  } catch (e) {
    setStatus('Error: ' + e.message, false, true);
  }
}

// ── Reload ─────────────────────────────────────────────────────────────────────

async function reloadAndRefresh() {
  const res = await fetch('/api/content');
  data = await res.json();
  renderSidebar();
  const page = data.pages.find(p => p.id === currentPageId);
  if (page) renderMain(page);
}

// ── New page modal ─────────────────────────────────────────────────────────────

function openNewPageModal() {
  document.getElementById('new-page-name').value = '';
  document.getElementById('new-page-modal').classList.add('open');
  document.getElementById('new-page-name').focus();
}

function closeNewPageModal() {
  document.getElementById('new-page-modal').classList.remove('open');
}

async function createPage() {
  const name = document.getElementById('new-page-name').value.trim();
  if (!name) { alert('Please enter a page name.'); return; }

  try {
    const res    = await fetch('/api/page', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name }),
    });
    const result = await res.json();
    if (result.ok) {
      closeNewPageModal();
      await reloadAndRefresh();
      selectPage(result.dir);
      setStatus(`✓ Created page "${name}"`, true);
    } else {
      alert('Error: ' + result.error);
    }
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

// ── Preview ────────────────────────────────────────────────────────────────────

async function quitApp() {
  if (unsaved && !confirm('You have unsaved changes. Quit anyway?')) return;
  if (!confirm('Quit the admin server?')) return;
  await fetch('/api/quit', { method: 'POST' }).catch(() => {});
  document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;color:#aaa">Server stopped. You can close this tab.</div>';
}

async function openPreview() {
  await saveCurrentPage();
  const url = (!currentPageId || currentPageId === 'home')
    ? '/preview/'
    : `/preview/${currentPageId}/`;
  window.open(url, '_blank');
}


// ── Push to GitHub ─────────────────────────────────────────────────────────────

async function pushToGithub() {
  if (!confirm('Sync Website?\n\nThis will pull any changes from the other computer, then push your changes live to shalaball.com within ~30 seconds.')) return;

  const log = document.getElementById('push-log');
  const btn = document.getElementById('push-btn');
  btn.disabled = true;
  btn.textContent = 'Pushing…';
  log.classList.add('visible');
  log.textContent = '$ git add -A && git commit && git push\n';

  try {
    const res    = await fetch('/api/push', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({}),
    });
    const result = await res.json();
    log.textContent += result.output || '(no output)';
    if (result.ok) {
      log.textContent += '\n\n✓ Done — live in ~30 seconds.';
      const w = document.getElementById('sync-warning');
      if (w) w.style.display = 'none';
    } else {
      log.textContent += '\n\n✗ Push failed.';
    }
  } catch (e) {
    log.textContent += '\n✗ Error: ' + e.message;
  } finally {
    btn.disabled = false;
    btn.textContent = '↑ Sync Website';
  }
}

// ── Status helpers ─────────────────────────────────────────────────────────────

function markUnsaved() {
  unsaved = true;
  const el = document.getElementById('save-status');
  if (el) { el.textContent = 'Unsaved changes'; el.className = 'save-status unsaved'; }
}

function markClean() {
  unsaved = false;
  const el = document.getElementById('save-status');
  if (el) { el.textContent = 'All changes saved'; el.className = 'save-status saved'; }
  const btn = document.getElementById('sidebar-save-btn');
  if (btn) {
    btn.textContent = '✓ Saved';
    btn.classList.add('saved');
    setTimeout(() => {
      btn.textContent = 'Save Changes';
      btn.classList.remove('saved');
    }, 1500);
  }
}

function checkUnsaved() {
  if (!unsaved) return true;
  return confirm('You have unsaved changes. Leave without saving?');
}

function saveCurrentPage() {
  if (currentPageId === 'home') return saveHome();
  if (currentPageId === 'about') return saveAbout();
  if (currentPageId === 'library') return saveLibrary();
  return saveChanges();
}

function setStatus(msg, ok, err) {
  const el = document.getElementById('save-status');
  if (!el) return;
  el.textContent = msg;
  el.className = 'save-status' + (ok ? ' saved' : err ? ' unsaved' : '');
}

// ── Color picker sync ──────────────────────────────────────────────────────────

function syncColorText(pickerId, textId) {
  document.getElementById(textId).value = document.getElementById(pickerId).value;
}

function syncColorPicker(textId, pickerId) {
  const val = document.getElementById(textId).value;
  if (/^#[a-fA-F0-9]{6}$/.test(val)) document.getElementById(pickerId).value = val;
}

// ── Utilities ──────────────────────────────────────────────────────────────────

function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/"/g, '&quot;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

// ── Modal close on backdrop click ──────────────────────────────────────────────

document.getElementById('new-page-modal').addEventListener('click', function(e) {
  if (e.target === this) closeNewPageModal();
});

document.getElementById('new-page-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') createPage();
  if (e.key === 'Escape') closeNewPageModal();
});

// ── Keyboard shortcuts ─────────────────────────────────────────────────────────

document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 's') {
    e.preventDefault();
    saveCurrentPage();
  }
});

window.addEventListener('beforeunload', e => {
  if (unsaved) { e.preventDefault(); e.returnValue = ''; }
});

// ── Start ──────────────────────────────────────────────────────────────────────

init();
</script>
